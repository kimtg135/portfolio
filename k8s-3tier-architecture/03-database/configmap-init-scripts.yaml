apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-init-scripts
  namespace: database
data:
  replication-setup.sql: |
    -- 복제 사용자 생성
    CREATE USER IF NOT EXISTS 'repl_user'@'%' IDENTIFIED BY 'Repl_Secure_Pass_456';
    GRANT REPLICATION SLAVE ON *.* TO 'repl_user'@'%';
    FLUSH PRIVILEGES;

    -- 기본 데이터베이스 생성
    CREATE DATABASE IF NOT EXISTS shop_db CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;

    -- 애플리케이션 사용자 생성
    CREATE USER IF NOT EXISTS 'shop_user'@'%' IDENTIFIED BY 'Shop_Pass_456';
    GRANT ALL PRIVILEGES ON shop_db.* TO 'shop_user'@'%';

    FLUSH PRIVILEGES;
    SHOW MASTER STATUS;

  shop-schema.sql: |
    USE shop_db;

    -- 사용자 테이블
    CREATE TABLE IF NOT EXISTS users (
      id BIGINT AUTO_INCREMENT PRIMARY KEY,
      email VARCHAR(255) NOT NULL UNIQUE,
      password_hash VARCHAR(255) NOT NULL,
      name VARCHAR(100) NOT NULL,
      role ENUM('user', 'admin') DEFAULT 'user',
      created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
      updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
      INDEX idx_email (email),
      INDEX idx_role (role)
    ) ENGINE=InnoDB;

    -- 상품 테이블
    CREATE TABLE IF NOT EXISTS products (
      id BIGINT AUTO_INCREMENT PRIMARY KEY,
      name VARCHAR(255) NOT NULL,
      description TEXT,
      price DECIMAL(10, 2) NOT NULL,
      stock INT NOT NULL DEFAULT 0,
      category VARCHAR(100),
      image_url VARCHAR(500),
      is_active BOOLEAN DEFAULT TRUE,
      created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
      updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
      INDEX idx_category (category),
      INDEX idx_is_active (is_active),
      FULLTEXT INDEX idx_search (name, description)
    ) ENGINE=InnoDB;

    -- 주문 테이블
    CREATE TABLE IF NOT EXISTS orders (
      id BIGINT AUTO_INCREMENT PRIMARY KEY,
      user_id BIGINT NOT NULL,
      status ENUM('pending', 'confirmed', 'shipping', 'delivered', 'cancelled') DEFAULT 'pending',
      total_amount DECIMAL(10, 2) NOT NULL,
      created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
      updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
      FOREIGN KEY (user_id) REFERENCES users(id),
      INDEX idx_user_id (user_id),
      INDEX idx_status (status)
    ) ENGINE=InnoDB;

    -- 주문 상세 테이블
    CREATE TABLE IF NOT EXISTS order_items (
      id BIGINT AUTO_INCREMENT PRIMARY KEY,
      order_id BIGINT NOT NULL,
      product_id BIGINT NOT NULL,
      quantity INT NOT NULL,
      price DECIMAL(10, 2) NOT NULL,
      FOREIGN KEY (order_id) REFERENCES orders(id),
      FOREIGN KEY (product_id) REFERENCES products(id),
      INDEX idx_order_id (order_id)
    ) ENGINE=InnoDB;

    -- 기본 관리자 계정 (bcrypt hash of 'admin1234')
    INSERT IGNORE INTO users (email, password_hash, name, role)
    VALUES ('admin@shop.local', '$2b$12$LJ3m4ys3Lk0TSwHBQWCxSOmYoYIoTrZfpOQqGYlMH3caHMnHaqiO6', 'Admin', 'admin');
