# FIX: 용량 10Gi → 15Gi로 수정 (PV와 일치시킴)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pvc-database-2
  namespace: database
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: nfs
  resources:
    requests:
      storage: 15Gi
  selector:
    matchLabels:
      pv: pv-database-2
