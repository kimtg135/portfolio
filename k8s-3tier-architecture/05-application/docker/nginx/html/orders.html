<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop - 주문내역</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f5f5f5;
        }

        header {
            background: #1a1a2e;
            color: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-size: 1.5rem;
        }

        nav a {
            color: #e0e0e0;
            text-decoration: none;
            margin-left: 1.5rem;
        }

        .container {
            max-width: 1000px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        h2 {
            margin-bottom: 1rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        th,
        td {
            padding: 0.75rem 1rem;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        th {
            background: #1a1a2e;
            color: white;
        }

        .status {
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.85rem;
        }

        .status-pending {
            background: #fff3cd;
            color: #856404;
        }

        .status-confirmed {
            background: #d1ecf1;
            color: #0c5460;
        }

        .status-shipping {
            background: #cce5ff;
            color: #004085;
        }

        .status-delivered {
            background: #d4edda;
            color: #155724;
        }

        .status-cancelled {
            background: #f8d7da;
            color: #721c24;
        }
    </style>
</head>

<body>
    <header>
        <h1>SHOP</h1>
        <nav>
            <a href="/">홈</a>
            <a href="/orders.html">주문내역</a>
            <a href="#" onclick="logout()">로그아웃</a>
        </nav>
    </header>
    <div class="container">
        <h2>내 주문내역</h2>
        <table>
            <thead>
                <tr>
                    <th>주문번호</th>
                    <th>상태</th>
                    <th>총액</th>
                    <th>주문일시</th>
                </tr>
            </thead>
            <tbody id="order-list"></tbody>
        </table>
    </div>
    <script>
        const API = '/api';
        const token = localStorage.getItem('token');
        if (!token) { location.href = '/'; }

        const statusMap = { pending: '대기', confirmed: '확인', shipping: '배송중', delivered: '배송완료', cancelled: '취소' };

        async function loadOrders() {
            const res = await fetch(`${API}/orders`, { headers: { 'Authorization': `Bearer ${token}` } });
            if (!res.ok) { location.href = '/'; return; }
            const orders = await res.json();
            document.getElementById('order-list').innerHTML = orders.map(o => `
                <tr>
                    <td>#${o.id}</td>
                    <td><span class="status status-${o.status}">${statusMap[o.status] || o.status}</span></td>
                    <td>${Number(o.total_amount).toLocaleString()}원</td>
                    <td>${o.created_at}</td>
                </tr>
            `).join('');
        }

        function logout() { localStorage.clear(); location.href = '/'; }
        loadOrders();
    </script>
</body>

</html>
