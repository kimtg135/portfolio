<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop - 관리자</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f5f5f5;
        }

        header {
            background: #721c24;
            color: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-size: 1.5rem;
        }

        nav a {
            color: #e0e0e0;
            text-decoration: none;
            margin-left: 1.5rem;
        }

        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .tab {
            padding: 0.75rem 1.5rem;
            background: white;
            border: 2px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
        }

        .tab.active {
            background: #721c24;
            color: white;
            border-color: #721c24;
        }

        .panel {
            display: none;
        }

        .panel.active {
            display: block;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        th,
        td {
            padding: 0.75rem 1rem;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        th {
            background: #1a1a2e;
            color: white;
        }

        .btn {
            padding: 0.4rem 0.8rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            color: white;
            font-size: 0.85rem;
        }

        .btn-add {
            background: #27ae60;
        }

        .btn-cancel {
            background: #e74c3c;
        }

        .btn-update {
            background: #2980b9;
        }

        .form-row {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }

        .form-row input,
        .form-row select {
            padding: 0.5rem;
            border: 1px solid #ddd;
            border-radius: 6px;
        }

        .form-row input[type="text"],
        .form-row input[type="number"] {
            flex: 1;
            min-width: 150px;
        }

        .status {
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-size: 0.8rem;
        }

        .status-pending {
            background: #fff3cd;
            color: #856404;
        }

        .status-confirmed {
            background: #d1ecf1;
            color: #0c5460;
        }

        .status-shipping {
            background: #cce5ff;
            color: #004085;
        }

        .status-delivered {
            background: #d4edda;
            color: #155724;
        }

        .status-cancelled {
            background: #f8d7da;
            color: #721c24;
        }

        #message {
            position: fixed;
            top: 1rem;
            right: 1rem;
            padding: 1rem 1.5rem;
            border-radius: 8px;
            display: none;
            z-index: 200;
        }

        .msg-success {
            background: #27ae60;
            color: white;
        }

        .msg-error {
            background: #e74c3c;
            color: white;
        }
    </style>
</head>

<body>
    <header>
        <h1>SHOP 관리자</h1>
        <nav>
            <a href="/">사용자 페이지</a>
            <a href="#" onclick="logout()">로그아웃</a>
        </nav>
    </header>

    <div class="container">
        <div class="tabs">
            <div class="tab active" onclick="switchTab('products')">상품 관리</div>
            <div class="tab" onclick="switchTab('orders')">주문 관리</div>
        </div>

        <!-- 상품 관리 -->
        <div class="panel active" id="panel-products">
            <h3 style="margin-bottom:1rem;">상품 등록</h3>
            <div class="form-row">
                <input type="text" id="p-name" placeholder="상품명">
                <input type="number" id="p-price" placeholder="가격" step="100">
                <input type="number" id="p-stock" placeholder="재고">
                <input type="text" id="p-category" placeholder="카테고리">
                <input type="text" id="p-image" placeholder="이미지 URL">
                <button class="btn btn-add" onclick="addProduct()">등록</button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>상품명</th>
                        <th>가격</th>
                        <th>재고</th>
                        <th>카테고리</th>
                        <th>관리</th>
                    </tr>
                </thead>
                <tbody id="admin-products"></tbody>
            </table>
        </div>

        <!-- 주문 관리 -->
        <div class="panel" id="panel-orders">
            <div class="form-row">
                <select id="order-filter" onchange="loadAdminOrders()">
                    <option value="">전체 상태</option>
                    <option value="pending">대기</option>
                    <option value="confirmed">확인</option>
                    <option value="shipping">배송중</option>
                    <option value="delivered">배송완료</option>
                    <option value="cancelled">취소</option>
                </select>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>주문번호</th>
                        <th>회원ID</th>
                        <th>상태</th>
                        <th>총액</th>
                        <th>주문일시</th>
                        <th>관리</th>
                    </tr>
                </thead>
                <tbody id="admin-orders"></tbody>
            </table>
        </div>
    </div>

    <div id="message"></div>

    <script>
        const API = '/api';
        const token = localStorage.getItem('token');
        const role = localStorage.getItem('role');
        if (!token || role !== 'admin') { alert('관리자 권한이 필요합니다.'); location.href = '/'; }

        const statusMap = { pending: '대기', confirmed: '확인', shipping: '배송중', delivered: '배송완료', cancelled: '취소' };
        const headers = { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` };

        function showMsg(text, type) {
            const el = document.getElementById('message');
            el.textContent = text;
            el.className = type === 'error' ? 'msg-error' : 'msg-success';
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 3000);
        }

        function switchTab(name) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(`panel-${name}`).classList.add('active');
            if (name === 'orders') loadAdminOrders();
        }

        // ─── 상품 관리 ─────────────
        async function loadAdminProducts() {
            const res = await fetch(`${API}/products?size=100`);
            const data = await res.json();
            document.getElementById('admin-products').innerHTML = data.items.map(p => `
                <tr>
                    <td>${p.id}</td>
                    <td>${p.name}</td>
                    <td>${Number(p.price).toLocaleString()}원</td>
                    <td>${p.stock}</td>
                    <td>${p.category || '-'}</td>
                    <td><button class="btn btn-cancel" onclick="deleteProduct(${p.id})">삭제</button></td>
                </tr>
            `).join('');
        }

        async function addProduct() {
            const body = {
                name: document.getElementById('p-name').value,
                price: parseFloat(document.getElementById('p-price').value),
                stock: parseInt(document.getElementById('p-stock').value),
                category: document.getElementById('p-category').value || null,
                image_url: document.getElementById('p-image').value || null
            };
            const res = await fetch(`${API}/admin/products`, { method: 'POST', headers, body: JSON.stringify(body) });
            if (res.ok) { showMsg('상품 등록 완료', 'success'); loadAdminProducts(); }
            else { showMsg('등록 실패', 'error'); }
        }

        async function deleteProduct(id) {
            if (!confirm('상품을 삭제하시겠습니까?')) return;
            const res = await fetch(`${API}/admin/products/${id}`, { method: 'DELETE', headers });
            if (res.ok) { showMsg('삭제 완료', 'success'); loadAdminProducts(); }
            else { showMsg('삭제 실패', 'error'); }
        }

        // ─── 주문 관리 ─────────────
        async function loadAdminOrders() {
            const status = document.getElementById('order-filter').value;
            const url = status ? `${API}/admin/orders?status=${status}` : `${API}/admin/orders`;
            const res = await fetch(url, { headers });
            const data = await res.json();
            document.getElementById('admin-orders').innerHTML = data.items.map(o => `
                <tr>
                    <td>#${o.id}</td>
                    <td>${o.user_id}</td>
                    <td><span class="status status-${o.status}">${statusMap[o.status] || o.status}</span></td>
                    <td>${Number(o.total_amount).toLocaleString()}원</td>
                    <td>${o.created_at}</td>
                    <td>
                        ${o.status !== 'cancelled' && o.status !== 'delivered' ? `
                            <select onchange="updateOrderStatus(${o.id}, this.value)">
                                <option value="">변경</option>
                                <option value="confirmed">확인</option>
                                <option value="shipping">배송중</option>
                                <option value="delivered">배송완료</option>
                                <option value="cancelled">취소</option>
                            </select>
                        ` : '-'}
                    </td>
                </tr>
            `).join('');
        }

        async function updateOrderStatus(id, status) {
            if (!status) return;
            const res = await fetch(`${API}/admin/orders/${id}`, { method: 'PATCH', headers, body: JSON.stringify({ status }) });
            if (res.ok) { showMsg('상태 변경 완료', 'success'); loadAdminOrders(); }
            else { showMsg('변경 실패', 'error'); }
        }

        function logout() { localStorage.clear(); location.href = '/'; }
        loadAdminProducts();
    </script>
</body>

</html>
